
<style>
  .verb-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab-btn {
    padding: 8px 20px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary); color: var(--color-text-secondary);
    cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
  .tab-btn:hover:not(.active) { background: var(--color-background-tertiary); }
  .tempo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .tempo-card {
    background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg); padding: 14px 16px;
  }
  .tempo-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .conj-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .conj-row:last-child { border-bottom: none; }
  .pronome { color: var(--color-text-secondary); }
  .forma { color: var(--color-text-primary); font-weight: 500; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin: 1.5rem 0 0.75rem; }
  .formas-nominais { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.5rem; }
  .forma-pill {
    background: var(--color-background-secondary); border-radius: 20px;
    padding: 5px 14px; font-size: 13px; border: 0.5px solid var(--color-border-tertiary);
  }
  .forma-pill span { color: var(--color-text-secondary); font-size: 12px; margin-right: 4px; }
</style>

</div>

    subjuntivo: {
      'Subj. Presente': [['eu','ponha'],['tu','ponhas'],['ele/ela','ponha'],['nós','ponhamos'],['vós','ponhais'],['eles/elas','ponham']],

      'Subj. Futuro': [['eu','puser'],['tu','puseres'],['ele/ela','puser'],['nós','pusermos'],['vós','puserdes'],['eles/elas','puserem']],

    },
    subjuntivo: {

let ativo = 'TER';

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = Object.keys(verbos).map(v => 
    `<button class="tab-btn ${v===ativo?'active':''}" onclick="setAtivo('${v}')">${v}</button>`
  ).join('');
}

function renderContent() {
  const d = verbos[ativo];
  const allTempos = {...d.indicativo, ...d.subjuntivo};
  
  let html = `<p class="section-label">Modo Indicativo</p><div class="tempo-grid">`;
  Object.entries(d.indicativo).forEach(([tempo, conj]) => {
    html += `<div class="tempo-card"><div class="tempo-title">${tempo}</div>`;
    conj.forEach(([p,f]) => html += `<div class="conj-row"><span class="pronome">${p}</span><span class="forma">${f}</span></div>`);
    html += `</div>`;
  });
  html += `</div>`;

  html += `<p class="section-label">Modo Subjuntivo</p><div class="tempo-grid">`;
  Object.entries(d.subjuntivo).forEach(([tempo, conj]) => {
    html += `<div class="tempo-card"><div class="tempo-title">${tempo}</div>`;
    conj.forEach(([p,f]) => html += `<div class="conj-row"><span class="pronome">${p}</span><span class="forma">${f}</span></div>`);
    html += `</div>`;
  });
  html += `</div>`;

  html += `<p class="section-label">Formas Nominais</p><div class="formas-nominais">`;
  Object.entries(d.nominais).forEach(([k,v]) => html += `<div class="forma-pill"><span>${k}:</span>${v}</div>`);
  html += `</div>`;

  html += `<p class="section-label" style="margin-top:1.5rem;">Verbos derivados</p><div class="formas-nominais">`;
  d.derivados.forEach(v => html += `<div class="forma-pill">${v}</div>`);
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

function setAtivo(v) { ativo = v; renderTabs(); renderContent(); }

renderTabs();
renderContent();
</script>
