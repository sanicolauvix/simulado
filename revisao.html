## TEMA PRINCIPAL
**Verbos: Definição, Conjugações e Tempos Verbais (Pretérito)**

---

## 1. O QUE É VERBO?

**Definição:**
- Classe de palavras que se flexiona em: **pessoa, número, tempo, modo e voz**

**O que o verbo pode indicar:**
- Ação (correr, fazer, ler)
- Estado (ficar, permanecer, ser)
- Fenômeno meteorológico (chover, amanhecer)
- Ocorrência (nascer, morrer)
- Desejo (querer, desejar)

---

## 2. AS TRÊS CONJUGAÇÕES VERBAIS

| Conjugação | Terminação | Exemplos |
|---|---|---|
| **1ª** | **-AR** | falar, jogar, dançar, estudar, morar |
| **2ª** | **-ER** | comer, correr, entender, haver |
| **3ª** | **-IR** | partir, cair, sair, dormir, surgir |

**CASO ESPECIAL:** Verbos terminados em **-PÔR** (pôr, compor, repor, supor, depor, expor) → **2ª conjugação**

---

## 3. MODOS VERBAIS (3 tipos)

### A) MODO INDICATIVO
- **Características:** Indica **certeza, realidade**
- Presente do indicativo → "Eu sempre estudo"
- Pretérito perfeito → "Estudei"
- Futuro do presente → "Estudarei"

### B) MODO SUBJUNTIVO
- **Características:** Indica **dúvida, hipótese, possibilidade, desejo, condição**
- **Palavras-chave:** talvez, quem sabe, se
- **Exemplo:** "Talvez eu estude amanhã"

### C) MODO IMPERATIVO
- **Características:** **Ordem ou pedido** (tempo presente)
- **Exemplos:** "Fique quieto!", "Preste atenção!"

---

## 4. TEMPOS VERBAIS DO PASSADO (PRETÉRITO)

### A) PRETÉRITO PERFEITO

- Ação **concluída** no passado — aspecto **perfeito** = terminado
- "Ele **estudou** as lições" (acabou, concluído)
- "Ele **entrou** na sala" (pronto, acabou)
- Terminações: **-OU, -ARA** — Falou, jogou, dançou, estudou

### B) PRETÉRITO PERFEITO COMPOSTO

- Ação que **começou no passado** e **continua até agora**
- Fato repetido ou frequente que se prolonga ao presente
- Usa **2 verbos** (ter/haver + particípio)
- Simples: "Estudei" = ação concluída
- Composto: "**Tenho estudado**" = continua até agora

### C) PRETÉRITO IMPERFEITO

- Ação **não concluída** no passado — ação **repetida ou contínua**
- "Ele **estudava**" — era uma repetição, não uma vez só
- "Ele **falava** a verdade" — frequentemente, repetidamente
- Terminações: **-AVA, -IA** — Falava, jogava, comia, fazia

### D) PRETÉRITO MAIS QUE PERFEITO

- **Passado do passado** — aconteceu antes de outra ação concluída
- Forma simples: "Ele **fechara** a porta"
- Forma composta: "Ele **tinha fechado** a porta"
- "Quando chegamos, a loja **já fechara**" (fechou antes de chegarmos)

### E) PRETÉRITO IMPERFEITO DO SUBJUNTIVO

- Ação no passado com ideia de **dúvida, hipótese, condição**
- Terminações: **-ASSE, -ESSE, -ISSE**
- "Se eu **tivesse** dinheiro..." (hipótese, não tenho)
- "Se ele **viesse** ao clube, **participaria** do campeonato" (não veio)

---

## 5. RESUMO COMPARATIVO DOS PRETÉRITOS

| Tempo | Característica | Exemplo |
|---|---|---|
| **Perfeito** | Ação concluída | Estudei |
| **Imperfeito** | Ação repetida/contínua | Estudava |
| **Mais que Perfeito** | Passado do passado | Já tinha estudado |
| **Perf. Composto** | Passado que continua | Tenho estudado |

---

## 6. PONTOS MAIS IMPORTANTES PARA CESGRANRIO

- **Diferença entre Perfeito e Imperfeito** — Perfeito = concluído / Imperfeito = repetido
- **As 3 Conjugações verbais** (-AR, -ER, -IR) — cuidado com verbos em -PÔR
- **Pretérito Mais que Perfeito** — reconhecer "tinha feito" ou "fizera"
- **Pretérito Imperfeito do Subjuntivo** — uso com "se" = hipótese irreal, terminações -ASSE/-ESSE/-ISSE
- **Indicativo vs Subjuntivo** — Indicativo = certeza / Subjuntivo = dúvida/hipótese

---

# 🎧 RESUMO EM ÁUDIO (Para ouvir no celular)

Existem TRÊS conjugações verbais. [pausa] Primeira conjugação: verbos terminados em A-R... FALAR, JOGAR, DANÇAR. [pausa] Segunda conjugação: verbos terminados em E-R... COMER, CORRER, ENTENDER. [pausa] Terceira conjugação: verbos terminados em I-R... PARTIR, SAIR, DORMIR. [pausa] Cuidado com o verbo PÔR! Ele é segunda conjugação também, junto com os derivados: COMPOR, REPOR, DEPOR. [pausa]

Grave bem essa diferença! [pausa] Ele ESTUDOU é perfeito. Ação concluída, uma vez só. [pausa] Ele ESTUDAVA é imperfeito. Ação repetida, frequente. Entendeu a diferença? [pausa]

Agora o PRETÉRITO MAIS QUE PERFEITO. [pausa] Esse é o PASSADO DO PASSADO. Aconteceu ANTES de outra ação que já foi concluída. [pausa] Tem DUAS formas: [pausa] FORMA SIMPLES: Ele FECHARA a porta. [pausa] FORMA COMPOSTA: Ele TINHA FECHADO a porta. Mesma coisa. [pausa] Exemplo: Quando chegamos, a loja JÁ FECHARA. Ou JÁ TINHA FECHADO. [pausa] Ela fechou ANTES de nós chegarmos. Passado do passado! [pausa]

E agora, PRETÉRITO IMPERFEITO DO SUBJUNTIVO. [pausa] Lembra que subjuntivo é DÚVIDA e HIPÓTESE? [pausa] Quando tem SE, é geralmente pretérito imperfeito do subjuntivo. [pausa] Terminações: ASSE, ESSE, ISSE. [pausa] Se eu TIVESSE dinheiro... Hipótese. [pausa] Se ele VIESSE ao clube, PARTICIPARIA do campeonato. Não veio, é hipótese. [pausa]

Então recapitulando! [pausa] PERFEITO: ação concluída. ESTUDEI. [pausa] IMPERFEITO: ação repetida. ESTUDAVA. [pausa] MAIS QUE PERFEITO: passado do passado. JÁ TINHA ESTUDADO ou ESTUDARA. [pausa] IMPERFEITO DO SUBJUNTIVO: hipótese com SE. SE EU ESTUDASSE. [pausa] Isso é o mais importante para sua prova! [pausa]

Pronto! Agora você conhece os verbos. Boa sorte! [pausa]`

// ═══════════════════════════════════════════════════════════════════
// MOTOR DE ÁUDIO (Web Speech API)
// ═══════════════════════════════════════════════════════════════════

let est = {
  aulaId: null,
  segs: [],
  idx: 0,
  tocando: false,
  velocidade: 1.0,
  timer: null
};

function prepararSegmentos(texto) {
  const inicio = texto.indexOf('# 🎧 RESUMO EM ÁUDIO');
  if (inicio === -1) return [];

  let audio = texto.slice(inicio);

  // Limpa markdown restante
  audio = audio
    .replace(/^# .*/gm, '')
    .replace(/\*\*/g, '')
    .replace(/\*/g, '')
    .replace(/^---+$/gm, '')
    .replace(/\[pausa\]/gi, '||P||');

  return audio.split('||P||')
    .map(s => s.replace(/\s+/g, ' ').trim())
    .filter(s => s.length > 4);
}

function togglePlay() {
  if (!est.aulaId) return;
  est.tocando ? pausar() : tocar();
}

function tocar() {
  if (!est.segs.length) return;
  if (est.idx >= est.segs.length) est.idx = 0;
  est.tocando = true;
  atualizarPlay();
  falarSeg(est.idx);
}

function pausar() {
  speechSynthesis.cancel();
  clearTimeout(est.timer);
  est.tocando = false;
  atualizarPlay();
}

function parar() {
  speechSynthesis.cancel();
  clearTimeout(est.timer);
  est.tocando = false;
  est.idx = 0;
  atualizarPlay();
  atualizarProg();
  document.getElementById('trecho-atual').textContent = 'Pressione ▶ para iniciar...';
}

function falarSeg(idx) {
  if (!est.tocando || idx >= est.segs.length) {
    if (idx >= est.segs.length) {
      est.tocando = false;
      est.idx = 0;
      atualizarPlay();
      document.getElementById('trecho-atual').textContent = '✅ Revisão concluída! Pressione ▶ para repetir.';
    }
    return;
  }

  est.idx = idx;
  const seg = est.segs[idx];
  document.getElementById('trecho-atual').textContent = seg;
  atualizarProg();

  const u = new SpeechSynthesisUtterance(seg);
  u.lang = 'pt-BR';
  u.rate = est.velocidade;
  u.onend = () => {
    if (est.tocando) est.timer = setTimeout(() => falarSeg(idx + 1), 700);
  };
  speechSynthesis.speak(u);
}

function setVelocidade(v) {
  est.velocidade = v;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('ativo', parseFloat(b.textContent) === v);
  });
  if (est.tocando) {
    speechSynthesis.cancel();
    clearTimeout(est.timer);
    est.timer = setTimeout(() => falarSeg(est.idx), 100);
  }
}

function atualizarPlay() {
  document.getElementById('btn-play').textContent = est.tocando ? '⏸' : '▶';
}

function atualizarProg() {
  const total = est.segs.length;
  const atual = est.tocando ? est.idx + 1 : est.idx;
  document.getElementById('prog-label').textContent = `${atual} / ${total} trechos`;
  document.getElementById('prog-fill').style.width = total > 0 ? (atual / total * 100) + '%' : '0%';
}

// ═══════════════════════════════════════════════════════════════════
// PARSER MARKDOWN → HTML
// ═══════════════════════════════════════════════════════════════════

function parseMd(texto) {
  // Usa só a parte antes da seção de áudio
  const corteAudio = texto.indexOf('# 🎧 RESUMO EM ÁUDIO');
  const resumo = corteAudio === -1 ? texto : texto.slice(0, corteAudio);
  return mdHTML(resumo);
}

function mdHTML(txt) {
  const linhas = txt.split('\n');
  let html = '', emUl = false, emTable = false;

  for (let i = 0; i < linhas.length; i++) {
    const l = linhas[i];

    if (/^---+$/.test(l.trim())) {
      if (emUl) { html += '</ul>'; emUl = false; }
      if (emTable) { html += '</tbody></table></div>'; emTable = false; }
      html += '<hr>'; continue;
    }

    if (l.trim().startsWith('|')) {
      if (emUl) { html += '</ul>'; emUl = false; }
      const cels = l.trim().split('|').slice(1, -1).map(c => c.trim());
      if (!emTable) {
        html += '<div class="table-wrap"><table><thead><tr>';
        html += cels.map(c => `<th>${inl(c)}</th>`).join('');
        html += '</tr></thead><tbody>';
        emTable = true;
      } else if (!cels.every(c => /^[-: ]+$/.test(c))) {
        html += '<tr>' + cels.map(c => `<td>${inl(c)}</td>`).join('') + '</tr>';
      }
      continue;
    }
    if (emTable) { html += '</tbody></table></div>'; emTable = false; }

    if (l.startsWith('### ')) {
      if (emUl) { html += '</ul>'; emUl = false; }
      html += `<h4>${inl(l.slice(4))}</h4>`;
    } else if (l.startsWith('## ')) {
      if (emUl) { html += '</ul>'; emUl = false; }
      html += `<h3>${inl(l.slice(3))}</h3>`;
    } else if (l.startsWith('# ')) {
      if (emUl) { html += '</ul>'; emUl = false; }
      html += `<h2>${inl(l.slice(2))}</h2>`;
    } else if (/^  ?- /.test(l) || l.startsWith('- ')) {
      if (!emUl) { html += '<ul>'; emUl = true; }
      html += `<li>${inl(l.replace(/^  ?- /, ''))}</li>`;
    } else if (!l.trim()) {
      if (emUl) { html += '</ul>'; emUl = false; }
    } else {
      if (emUl) { html += '</ul>'; emUl = false; }
      html += `<p>${inl(l)}</p>`;
    }
  }
  if (emUl) html += '</ul>';
  if (emTable) html += '</tbody></table></div>';
  return html;
}

function inl(t) {
  return t
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}

// ═══════════════════════════════════════════════════════════════════
// RENDERIZAÇÃO
// ═══════════════════════════════════════════════════════════════════

function renderSidebar() {
  const grupos = {};
  RESUMOS.forEach(r => {
    if (!grupos[r.disciplina]) grupos[r.disciplina] = [];
    grupos[r.disciplina].push(r);
  });

  let html = '';
  Object.entries(grupos).forEach(([disc, aulas]) => {
    aulas.sort((a, b) => a.semana - b.semana).forEach(a => {
      html += `
        <div class="aula-card" id="card-${a.id}" onclick="selecionarAula('${a.id}')">
          <div class="disc">${disc}</div>
          <div class="nome">${a.titulo}</div>
          <span class="badge">Semana ${a.semana}</span>
        </div>`;
    });
  });
  document.getElementById('lista-aulas').innerHTML = html;
}

function selecionarAula(id) {
  const aula = RESUMOS.find(r => r.id === id);
  if (!aula) return;

  parar();

  est.aulaId = id;
  est.segs = prepararSegmentos(aula.texto);
  est.idx = 0;

  document.querySelectorAll('.aula-card').forEach(c => c.classList.remove('ativo'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('ativo');

  document.getElementById('player-nome').textContent = aula.titulo;
  document.getElementById('trecho-atual').textContent =
    `${est.segs.length} trechos prontos — pressione ▶ para ouvir`;
  atualizarProg();

  document.getElementById('conteudo-aula').innerHTML = `
    <div class="summary-header">
      <div class="summary-disc">${aula.disciplina}</div>
      <div class="summary-titulo">${aula.titulo}</div>
    </div>
    <div class="summary-body">${parseMd(aula.texto)}</div>`;
}

// Inicializa
renderSidebar();
if (RESUMOS.length > 0) selecionarAula(RESUMOS[0].id);
</script>
